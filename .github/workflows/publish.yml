name: Publish suitecloud-mcp
on:
  push:
    tags: ['mcp-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    # npm trusted publishing (OIDC): no NPM_TOKEN secret; the workflow
    # authenticates via the id-token permission. Requires the trusted
    # publisher to be configured on npmjs.com for this repo + workflow file.
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 bundles npm >= 11.5.1, required for OIDC trusted publishing.
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Verify tag matches package version
        run: |
          test "mcp-v$(node -p "require('./package.json').version")" = "${GITHUB_REF_NAME}"
      - run: npm test
      - run: npm publish --access public
